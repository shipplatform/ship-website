<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Coming Soon</title>
    <meta name="description" content="Something exciting is on the way." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --color-ship-black: #0a0a0a;
        --color-ship-white: #fafafa;
        --color-ship-accent: #3b82f6;
        --color-ship-gray-500: #6b7280;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      html {
        background: var(--color-ship-black);
        color: var(--color-ship-white);
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-ship-black);
        color: var(--color-ship-white);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::selection {
        background: var(--color-ship-accent);
        color: #ffffff;
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
      }

      .page-content {
        max-width: 480px;
        text-align: center;
      }

      .page-title {
        margin: 0 0 16px;
        font-size: clamp(2.5rem, 4vw, 3rem);
        font-weight: 600;
        letter-spacing: -0.04em;
      }

      .page-subtitle {
        margin: 0;
        font-size: 1.125rem;
        color: var(--color-ship-gray-500);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="page-content">
        <h1 class="page-title">Coming Soon</h1>
        <p class="page-subtitle">
          Something exciting is on the way. Check back later.
        </p>
      </div>
    </main>
  </body>
</html>
