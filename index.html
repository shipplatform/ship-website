<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SHIP</title>
    <meta name="description" content="Coming soon." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Syne:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --color-ship-black: #0a0a0a;
        --color-ship-white: #fafafa;
        --color-ship-accent: #3b82f6;
        --color-ship-gray-500: #6b7280;
        --color-ship-gray-800: #1f2937;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-wordmark: "Syne", system-ui, sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }

      html { background: var(--color-ship-black); color: var(--color-ship-white); }

      body {
        font-family: var(--font-sans);
        background: var(--color-ship-black);
        color: var(--color-ship-white);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }

      ::selection { background: var(--color-ship-accent); color: #fff; }

      .wordmark {
        font-family: var(--font-wordmark);
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-ship-white);
        text-decoration: none;
        margin-bottom: 16px;
      }

      .tagline {
        font-size: 0.875rem;
        color: var(--color-ship-gray-500);
        margin: 0 0 64px;
      }

      footer {
        display: flex;
        gap: 20px;
      }

      footer a {
        font-size: 0.75rem;
        color: var(--color-ship-gray-500);
        text-decoration: none;
      }
      footer a:hover { color: var(--color-ship-white); }
    </style>
  </head>
  <body>
    <a href="/" class="wordmark">SHIP</a>
    <p class="tagline">Coming soon.</p>
    <footer>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/security.html">Security</a>
    </footer>
  </body>
</html>
